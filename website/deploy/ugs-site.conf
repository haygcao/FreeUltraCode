# 域名 HTTPS（证书覆盖 skillshare.center / www）。
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name skillshare.center www.skillshare.center;

    ssl_certificate     /etc/nginx/ssl/skillshare.center.pem;
    ssl_certificate_key /etc/nginx/ssl/skillshare.center.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root  /var/www/ugs;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
